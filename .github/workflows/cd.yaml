name: CD

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:

  cd_wiki:
    name: Synchronise
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: 'warp-core/endless-sky.wiki'
          path: 'endless-sky.wiki/'
      - name: Synchronise
        run: |
          copy /y 'wiki/*.md' 'endless-sky.wiki/'
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git remote --set-url origin "https://warp-core:{{ secrets.WIKI_TOKEN }}@github.com/warp-core/endless-sky.wiki.git"
          cd endless-sky.wiki
          git add .
          git commit -m "Update"
          git push origin
